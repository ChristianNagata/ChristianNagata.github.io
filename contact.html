<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Christian Nagata</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      line-height: 1.7;
      padding: 2rem 1rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      box-shadow: 0 2px 16px rgba(0,0,0,.06);
      text-align: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111;
      margin-bottom: .3rem;
    }

    .subtitle {
      font-size: .95rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      padding: .75rem 1.5rem;
      border-radius: 8px;
      transition: background .15s, border-color .15s;
    }

    .contact-link:hover {
      background: #dcfce7;
      border-color: #86efac;
    }

    .contact-link svg {
      flex-shrink: 0;
    }

    footer {
      margin-top: 2rem;
      font-size: .8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="avatar">👋</div>

  <h1>Christian Nagata</h1>
  <p class="subtitle">Mobile app developer</p>

  <a class="contact-link" href="mailto:christian.ryohji@gmail.com">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="16" x="2" y="4" rx="2"/>
      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </svg>
    christian.ryohji@gmail.com
  </a>

  <footer>
    <p>© 2026 Christian Nagata</p>
  </footer>

</div>
</body>
</html>
